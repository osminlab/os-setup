# ──────────────────────────────────────────────────
# ubuntu.yaml — Ubuntu packages (apt)
# ──────────────────────────────────────────────────

# Core tools you'd want on every machine
essentials:
  - git
  - curl
  - wget
  - build-essential

# Development-specific tools
dev_tools:
  - python3
  - python3-pip
  - nodejs
  - npm
  - docker.io
  - docker-compose
  - zsh

# Terminal enhancement utilities
cli_tools:
  - fzf
  - tree
