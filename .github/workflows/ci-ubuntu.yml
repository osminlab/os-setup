name: CI — Ubuntu

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v --junit-xml=results.xml

      - name: Smoke test — CLI version
        run: uv run python -m os_setup.cli --version

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-ubuntu
          path: results.xml
          retention-days: 30
